apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
    isDefault: true
    jsonData:
      timeInterval: "30s"
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki-stack.monitoring.svc.cluster.local:3100
    jsonData:
      maxLines: 5000
