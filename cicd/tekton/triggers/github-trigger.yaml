apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: aegis-pipeline-trigger-template
  namespace: tekton-pipelines
spec:
  params:
    - name: git-revision
    - name: git-repo-url
    - name: image-name
    - name: image-digest
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: aegis-security-run-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: aegis-security-pipeline
        params:
          - name: IMAGE
            value: $(tt.params.image-name)
          - name: IMAGE_DIGEST
            value: $(tt.params.image-digest)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 1Gi
          - name: pipeline-cache
            persistentVolumeClaim:
              claimName: tekton-pipeline-cache
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: git-revision
      value: $(body.head_commit.id)
    - name: git-repo-url
      value: $(body.repository.clone_url)
    - name: image-name
      value: $(body.repository.full_name)
    - name: image-digest
      value: $(body.head_commit.id)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-event-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: github-push
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: [push]
        - ref:
            name: cel
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' ||
                body.ref.startsWith('refs/heads/release/')
      bindings:
        - ref: github-push-binding
      template:
        ref: aegis-pipeline-trigger-template
