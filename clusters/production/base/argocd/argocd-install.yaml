apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.9.3/manifests/install.yaml
  - argocd-ingress.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
        namespace: argocd
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                args:
                  - /usr/local/bin/argocd-server
                  - --insecure   # TLS terminated at ingress/Istio
    target:
      kind: Deployment
      name: argocd-server
