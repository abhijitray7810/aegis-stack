# ============================================================
# Aegis Stack — Vault Secrets Examples
# ============================================================
# These are EXAMPLES only. Never store real secrets in Git.
# Apply with: vault kv put secret/aegis/<service>/config key=value

# Enable KV v2:
#   vault secrets enable -path=secret kv-v2

# Application config:
#   vault kv put secret/aegis/secure-api/config \
#     db_host="postgres.secure-apps.svc.cluster.local" \
#     db_port="5432" \
#     db_name="appdb"

# Application credentials:
#   vault kv put secret/aegis/secure-api/credentials \
#     db_username="appuser" \
#     db_password="REPLACE" \
#     jwt_secret="REPLACE_256BIT" \
#     api_key="REPLACE"

# Database dynamic secrets:
#   vault secrets enable database
#   vault write database/config/aegis-postgres \
#     plugin_name="postgresql-database-plugin" \
#     allowed_roles="aegis-readonly,aegis-readwrite" \
#     connection_url="postgresql://{{username}}:{{password}}@postgres:5432/appdb" \
#     username="vaultadmin" password="REPLACE"
#
#   vault write database/roles/aegis-readonly \
#     db_name="aegis-postgres" \
#     creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' \
#       VALID UNTIL '{{expiration}}'; GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"{{name}}\";" \
#     default_ttl="1h" max_ttl="24h"

# PKI:
#   vault secrets enable pki
#   vault secrets tune -max-lease-ttl=87600h pki
#   vault write pki/root/generate/internal common_name="aegis-stack Root CA" ttl=87600h
